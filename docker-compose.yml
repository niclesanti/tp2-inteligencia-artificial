services:
  db:
    image: postgres:14
    container_name: postgres-campito
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campito-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-campito
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - campito-net

  backend:
    build: ./backend
    container_name: springboot-campito
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME} # Se conecta usando el nombre del servicio 'db'
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev} # Por defecto 'dev' si no se especifica
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3100}
      # Configuración del Agente IA (Groq - Llama 3.3)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AGENTE_IA_ENABLED: ${AGENTE_IA_ENABLED:-false}
    networks:
      - campito-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-campito
    depends_on:
      - backend
    networks:
      - campito-net

  agente:
    build: ./agente
    container_name: python-agente-ia
    depends_on:
      - backend
      - qdrant
      - redis
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      QDRANT_HOST: qdrant
      REDIS_HOST: redis
      BACKEND_URL: http://backend:8080
      # Observabilidad: Langfuse (trazas estructuradas vía OpenTelemetry)
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    networks:
      - campito-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-db
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - campito-net

  redis:
    image: redis:7-alpine
    container_name: redis-session-store
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - campito-net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: always
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - campito-net

volumes:
  postgres_data:
  pgadmin_data:
  qdrant_data:
  redis_data:
  redisinsight_data:

networks:
  campito-net:
