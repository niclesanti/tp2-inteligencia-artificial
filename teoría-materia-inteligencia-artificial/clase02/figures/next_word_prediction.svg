<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 0.8; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .bg-soft { fill: #F4F2FF; }
      .text { fill: #222222; font-size: 14px; }
      .text-strong { fill: #222222; font-size: 18px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .text-mono-lg { font-family: 'JetBrains Mono', monospace; font-size: 18px; fill: #222222; }
      .text-mono { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #222222; }
      .accent-text { fill: #7F77DD; font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <text x="480" y="40" text-anchor="middle" class="text-strong" font-size="22">La red predice la próxima palabra</text>

  <!-- input tokens column -->
  <g transform="translate(80,100)">
    <text x="0" y="-10" class="text-xs">contexto (4 tokens)</text>
    <g class="text-mono-lg">
      <text x="0" y="20">cat</text>
      <text x="0" y="60">sat</text>
      <text x="0" y="100">on</text>
      <text x="0" y="140">a</text>
    </g>
  </g>

  <!-- arrows from tokens into network -->
  <g class="stroke-thin">
    <line x1="160" y1="115" x2="240" y2="180"/>
    <line x1="160" y1="155" x2="240" y2="200"/>
    <line x1="160" y1="195" x2="240" y2="220"/>
    <line x1="160" y1="235" x2="240" y2="240"/>
  </g>

  <!-- Neural net box -->
  <g transform="translate(240,140)">
    <rect x="0" y="0" width="380" height="160" rx="10" class="stroke bg-soft"/>
    <text x="190" y="-8" text-anchor="middle" class="text-strong" font-size="14">Red neuronal (Transformer)</text>

    <!-- 3 layers of nodes -->
    <g fill="#FFFFFF" class="stroke">
      <!-- layer 1 -->
      <circle cx="60" cy="40" r="9"/>
      <circle cx="60" cy="80" r="9"/>
      <circle cx="60" cy="120" r="9"/>
      <!-- layer 2 -->
      <circle cx="160" cy="30" r="9"/>
      <circle cx="160" cy="65" r="9"/>
      <circle cx="160" cy="100" r="9"/>
      <circle cx="160" cy="135" r="9"/>
      <!-- layer 3 -->
      <circle cx="260" cy="40" r="9"/>
      <circle cx="260" cy="80" r="9"/>
      <circle cx="260" cy="120" r="9"/>
    </g>
    <!-- connections (subset for clarity) -->
    <g class="stroke-thin" opacity="0.5">
      <line x1="69" y1="40" x2="151" y2="30"/><line x1="69" y1="40" x2="151" y2="65"/><line x1="69" y1="40" x2="151" y2="100"/>
      <line x1="69" y1="80" x2="151" y2="30"/><line x1="69" y1="80" x2="151" y2="65"/><line x1="69" y1="80" x2="151" y2="100"/><line x1="69" y1="80" x2="151" y2="135"/>
      <line x1="69" y1="120" x2="151" y2="65"/><line x1="69" y1="120" x2="151" y2="100"/><line x1="69" y1="120" x2="151" y2="135"/>
      <line x1="169" y1="30" x2="251" y2="40"/><line x1="169" y1="30" x2="251" y2="80"/>
      <line x1="169" y1="65" x2="251" y2="40"/><line x1="169" y1="65" x2="251" y2="80"/>
      <line x1="169" y1="100" x2="251" y2="80"/><line x1="169" y1="100" x2="251" y2="120"/>
      <line x1="169" y1="135" x2="251" y2="80"/><line x1="169" y1="135" x2="251" y2="120"/>
    </g>

    <!-- params indicator -->
    <text x="320" y="135" text-anchor="middle" class="text-xs" fill="#7F77DD">parámetros</text>
    <path d="M310 110 L330 110 L335 100 L335 130 L310 130 Z" fill="#FFFFFF" class="stroke-thin"/>
    <text x="322" y="125" text-anchor="middle" font-size="9" font-family="'JetBrains Mono', monospace" fill="#7F77DD">ZIP</text>
  </g>

  <!-- arrow out -->
  <g transform="translate(620,220)">
    <line x1="0" y1="0" x2="60" y2="0" class="accent"/>
    <polygon points="60,0 52,-5 52,5" fill="#7F77DD"/>
  </g>

  <!-- output: probability over vocab -->
  <g transform="translate(700,140)">
    <text x="0" y="-10" class="text-xs">próximo token (probabilidades)</text>
    <g>
      <text x="0" y="20" class="accent-text">mat</text>
      <text x="80" y="20" class="text-mono-lg" fill="#7F77DD">97%</text>

      <text x="0" y="60" class="text-mono-lg" fill="#888">rug</text>
      <text x="80" y="60" class="text-mono" fill="#888">2%</text>

      <text x="0" y="92" class="text-mono-lg" fill="#888">chair</text>
      <text x="80" y="92" class="text-mono" fill="#888">0.5%</text>

      <text x="0" y="124" class="text-mono-lg" fill="#BBB">…</text>
    </g>
  </g>

  <!-- bottom note -->
  <text x="480" y="400" text-anchor="middle" class="text-xs" fill="#444">El entrenamiento es masivamente esto: dada una ventana de tokens, ¿cuál sigue?</text>
</svg>
