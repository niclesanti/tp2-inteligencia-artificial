<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .label { fill: #222222; font-size: 12px; font-weight: 600; }
    </style>
  </defs>

  <text x="480" y="36" text-anchor="middle" class="text-strong" font-size="22">Context window: el límite que motiva RAG</text>
  <text x="480" y="56" text-anchor="middle" class="text-xs">Todo lo que el modelo "ve" en una llamada entra en una sola ventana. Y compite por el espacio.</text>

  <!-- Stacked bar -->
  <g transform="translate(80,100)">
    <text x="0" y="-10" class="label">Una llamada al modelo</text>

    <!-- bar -->
    <rect x="0" y="0" width="800" height="56" rx="4" class="stroke" fill="#FFFFFF"/>

    <!-- system -->
    <rect x="0" y="0" width="80" height="56" fill="#E0D7F8"/>
    <text x="40" y="32" text-anchor="middle" class="text-xs" font-weight="600">SYSTEM</text>

    <!-- history -->
    <rect x="80" y="0" width="200" height="56" fill="#C7B7F2"/>
    <text x="180" y="32" text-anchor="middle" class="text-xs" font-weight="600">historial</text>

    <!-- documents -->
    <rect x="280" y="0" width="380" height="56" fill="#9E8FE5"/>
    <text x="470" y="32" text-anchor="middle" class="text-xs" font-weight="600" fill="#FFFFFF">documentos / contexto inyectado</text>

    <!-- user query -->
    <rect x="660" y="0" width="140" height="56" fill="#7F77DD"/>
    <text x="730" y="32" text-anchor="middle" class="text-xs" font-weight="600" fill="#FFFFFF">USER</text>

    <!-- ruler labels -->
    <line x1="0" y1="76" x2="800" y2="76" class="stroke-thin"/>
    <text x="0" y="90" class="text-xs">0 tokens</text>
    <text x="800" y="90" text-anchor="end" class="text-xs">límite del modelo</text>
  </g>

  <!-- model sizes -->
  <g transform="translate(80,200)">
    <text x="0" y="0" class="label">Tamaños actuales</text>

    <g transform="translate(0,16)" class="text">
      <text y="20">• Claude Opus 4.6</text>
      <text x="240" y="20" class="text-xs" fill="#7F77DD" font-weight="600">200 K tokens</text>
      <text x="360" y="20" class="text-xs" fill="#666">≈ 150.000 palabras</text>

      <text y="44">• Gemini 3.1 Pro</text>
      <text x="240" y="44" class="text-xs" fill="#7F77DD" font-weight="600">1 M tokens</text>
      <text x="360" y="44" class="text-xs" fill="#666">≈ 750.000 palabras</text>

      <text y="68">• Llama 4 Scout</text>
      <text x="240" y="68" class="text-xs" fill="#7F77DD" font-weight="600">10 M tokens</text>
      <text x="360" y="68" class="text-xs" fill="#666">≈ 7,5 M palabras</text>
    </g>
  </g>

  <!-- Problems list -->
  <g transform="translate(80,320)">
    <text x="0" y="0" class="label">Pero…</text>

    <g class="text-xs" fill="#222">
      <text y="22">✗ Más contexto = más costo por llamada (cobran por token).</text>
      <text y="40">✗ Más contexto = más latencia.</text>
      <text y="58">✗ "Lost in the middle": información del medio del contexto se pierde.</text>
      <text y="76"><tspan fill="#D14B4B" font-weight="600">✗ Tu empresa tiene 50.000 documentos. Eso no entra en NINGÚN contexto.</tspan></text>
    </g>
  </g>

  <text x="480" y="446" text-anchor="middle" class="text" fill="#7F77DD" font-weight="600">→ Eso es exactamente lo que RAG (Clase 3) viene a resolver.</text>
</svg>
