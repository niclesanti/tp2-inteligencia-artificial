<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .bg-soft { fill: #F4F2FF; }
      .text { fill: #222222; font-size: 12px; }
      .text-strong { fill: #222222; font-size: 13px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 10px; }
      .accent-fill { fill: #7F77DD; }
    </style>
  </defs>

  <text x="480" y="40" text-anchor="middle" class="text-strong" font-size="20">Recorrido de la clase</text>

  <!-- timeline line -->
  <line x1="60" y1="160" x2="900" y2="160" class="accent"/>

  <!-- 8 nodes from 0 to 7, spaced ~120px apart -->
  <g>
    <!-- 0: Apertura -->
    <circle cx="80" cy="160" r="22" class="stroke bg-soft"/>
    <text x="80" y="165" text-anchor="middle" class="text-strong">0</text>
    <text x="80" y="210" text-anchor="middle" class="text">Apertura</text>
    <text x="80" y="224" text-anchor="middle" class="text-xs">Demo Groq</text>

    <!-- 1: ¿Qué es un LLM? -->
    <circle cx="200" cy="160" r="22" class="stroke bg-soft"/>
    <text x="200" y="165" text-anchor="middle" class="text-strong">1</text>
    <text x="200" y="210" text-anchor="middle" class="text">¿Qué es un LLM?</text>
    <text x="200" y="224" text-anchor="middle" class="text-xs">Karpathy core</text>

    <!-- 2: Transformer -->
    <circle cx="320" cy="160" r="22" class="stroke bg-soft"/>
    <text x="320" y="165" text-anchor="middle" class="text-strong">2</text>
    <text x="320" y="210" text-anchor="middle" class="text">Transformer</text>
    <text x="320" y="224" text-anchor="middle" class="text-xs">Attention, Q/K/V</text>

    <!-- 3: Ciclo de vida -->
    <circle cx="440" cy="160" r="22" class="stroke bg-soft"/>
    <text x="440" y="165" text-anchor="middle" class="text-strong">3</text>
    <text x="440" y="210" text-anchor="middle" class="text">Ciclo de vida</text>
    <text x="440" y="224" text-anchor="middle" class="text-xs">SFT → RLHF/DPO</text>

    <!-- corte marker (between 3 and 4) -->
    <line x1="500" y1="135" x2="500" y2="185" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="500" y="128" text-anchor="middle" class="text-xs" fill="#999">corte</text>

    <!-- 4: Scaling -->
    <circle cx="560" cy="160" r="22" class="stroke bg-soft"/>
    <text x="560" y="165" text-anchor="middle" class="text-strong">4</text>
    <text x="560" y="210" text-anchor="middle" class="text">Scaling 2026</text>
    <text x="560" y="224" text-anchor="middle" class="text-xs">post-training</text>

    <!-- 5: Prompting -->
    <circle cx="680" cy="160" r="22" class="stroke bg-soft"/>
    <text x="680" y="165" text-anchor="middle" class="text-strong">5</text>
    <text x="680" y="210" text-anchor="middle" class="text">Prompting</text>
    <text x="680" y="224" text-anchor="middle" class="text-xs">Diseño + práctica</text>

    <!-- 6: Evals y monitoreo -->
    <circle cx="800" cy="160" r="22" class="stroke bg-soft"/>
    <text x="800" y="165" text-anchor="middle" class="text-strong">6</text>
    <text x="800" y="210" text-anchor="middle" class="text">Evals + monitoreo</text>
    <text x="800" y="224" text-anchor="middle" class="text-xs">producción</text>

    <!-- 7: → RAG -->
    <circle cx="900" cy="160" r="22" fill="#7F77DD" stroke="#7F77DD"/>
    <text x="900" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">7</text>
    <text x="900" y="210" text-anchor="middle" class="text">→ RAG</text>
    <text x="900" y="224" text-anchor="middle" class="text-xs">Clase 3</text>
  </g>
</svg>
