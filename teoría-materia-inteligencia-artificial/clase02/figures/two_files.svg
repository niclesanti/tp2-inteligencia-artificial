<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .bg-soft { fill: #F4F2FF; }
      .file-fill { fill: #FFFFFF; }
      .text { fill: #222222; font-size: 16px; }
      .text-sm { fill: #444444; font-size: 13px; }
      .text-xs { fill: #666666; font-size: 11px; }
      .text-mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #222222; font-size: 13px; }
      .label-strong { fill: #222222; font-size: 15px; font-weight: 600; }
      .accent-fill { fill: #7F77DD; }
    </style>
  </defs>

  <!-- LEFT: Folder window "llama-2-70b" -->
  <g transform="translate(40,80)">
    <!-- window frame -->
    <rect x="0" y="0" width="380" height="320" rx="10" class="stroke bg-soft"/>
    <!-- title bar -->
    <rect x="0" y="0" width="380" height="36" rx="10" class="stroke" fill="#FFFFFF"/>
    <rect x="0" y="26" width="380" height="10" fill="#FFFFFF"/>
    <line x1="0" y1="36" x2="380" y2="36" class="stroke-thin"/>
    <!-- traffic lights (subtle) -->
    <circle cx="16" cy="18" r="4" fill="#E0E0E0"/>
    <circle cx="30" cy="18" r="4" fill="#E0E0E0"/>
    <circle cx="44" cy="18" r="4" fill="#E0E0E0"/>
    <!-- folder name -->
    <text x="190" y="23" text-anchor="middle" class="label-strong">llama-2-70b</text>

    <!-- file: parameters -->
    <g transform="translate(70,80)">
      <path d="M0 0 L60 0 L80 20 L80 100 L0 100 Z" class="stroke file-fill"/>
      <path d="M60 0 L60 20 L80 20" class="stroke-thin"/>
      <text x="40" y="125" text-anchor="middle" class="text">parameters</text>
      <text x="40" y="170" text-anchor="middle" class="text-sm" fill="#7F77DD">140 GB</text>
      <!-- arrow up to file -->
      <line x1="40" y1="160" x2="40" y2="135" class="accent"/>
      <polygon points="40,128 36,138 44,138" class="accent-fill"/>
    </g>

    <!-- file: run.c -->
    <g transform="translate(230,80)">
      <path d="M0 0 L60 0 L80 20 L80 100 L0 100 Z" class="stroke file-fill"/>
      <path d="M60 0 L60 20 L80 20" class="stroke-thin"/>
      <text x="68" y="44" text-anchor="middle" class="text-mono" font-size="11">.c</text>
      <text x="40" y="125" text-anchor="middle" class="text">run.c</text>
      <text x="40" y="160" text-anchor="middle" class="text-sm" fill="#7F77DD">~500 líneas</text>
      <text x="40" y="178" text-anchor="middle" class="text-sm" fill="#7F77DD">de C</text>
      <line x1="40" y1="148" x2="40" y2="135" class="accent"/>
      <polygon points="40,128 36,138 44,138" class="accent-fill"/>
    </g>

    <!-- caption inside window -->
    <text x="190" y="270" text-anchor="middle" class="text-xs">Un LLM, en disco, son solo dos archivos.</text>
  </g>

  <!-- RIGHT: MacBook + offline indicator -->
  <g transform="translate(540,90)">
    <!-- WiFi icon crossed -->
    <g transform="translate(150,0)">
      <path d="M0 22 Q24 -2 48 22" class="stroke-thin"/>
      <path d="M8 28 Q24 12 40 28" class="stroke-thin"/>
      <path d="M16 34 Q24 26 32 34" class="stroke-thin"/>
      <circle cx="24" cy="40" r="2" fill="#222222"/>
      <!-- crossed line -->
      <line x1="2" y1="2" x2="46" y2="44" stroke="#D14B4B" stroke-width="2"/>
      <text x="24" y="64" text-anchor="middle" class="text-xs" fill="#D14B4B">offline</text>
    </g>

    <!-- MacBook screen -->
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="340" height="200" rx="8" class="stroke" fill="#1A1A1A"/>
      <rect x="10" y="10" width="320" height="180" rx="3" fill="#FFFFFF"/>
      <!-- bezel notch -->
      <circle cx="170" cy="6" r="2" fill="#444444"/>
      <!-- terminal-ish content -->
      <text x="24" y="42" class="text-mono" font-size="11">$ ./run parameters</text>
      <text x="24" y="64" class="text-mono" font-size="11" fill="#7F77DD">&gt; Loaded 70B parameters</text>
      <text x="24" y="84" class="text-mono" font-size="11" fill="#7F77DD">&gt; Ready.</text>
      <text x="24" y="116" class="text-mono" font-size="11">&gt; ¿Qué es un LLM?</text>
      <text x="24" y="138" class="text-mono" font-size="11" fill="#444444">Un modelo de lenguaje</text>
      <text x="24" y="156" class="text-mono" font-size="11" fill="#444444">grande es...</text>
      <!-- caret -->
      <rect x="170" y="148" width="7" height="12" fill="#222222">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- MacBook base -->
    <path d="M-10 280 L350 280 L360 296 L-20 296 Z" class="stroke" fill="#E8E8E8"/>
    <rect x="155" y="280" width="30" height="4" fill="#CCCCCC"/>

    <!-- caption right -->
    <text x="170" y="356" text-anchor="middle" class="text-xs">Corre 100% local. Sin internet, sin API, sin login.</text>
  </g>

  <!-- CONNECTOR arrow center -->
  <g transform="translate(430,240)">
    <line x1="0" y1="0" x2="100" y2="0" class="stroke"/>
    <polygon points="100,0 92,-5 92,5" fill="#222222"/>
    <text x="50" y="-12" text-anchor="middle" class="text-xs">compilar + correr</text>
  </g>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" class="text" font-size="22" font-weight="600">Un LLM = dos archivos</text>
</svg>
