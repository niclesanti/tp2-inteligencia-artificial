<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .text-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #222222; }
      .label { fill: #7F77DD; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
      .arrow-fill { fill: #222222; }
    </style>
    <marker id="arrow-mp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <text x="480" y="36" text-anchor="middle" class="text-strong" font-size="22">Qué loggear en producción</text>
  <text x="480" y="58" text-anchor="middle" class="text-xs">Sin estos cuatro datos, estás operando a ciegas. Con ellos, podés diagnosticar, mejorar y facturar.</text>

  <!-- Pipeline diagram -->
  <g transform="translate(40,100)">
    <!-- App -->
    <rect x="0" y="40" width="120" height="60" rx="8" class="stroke bg-block"/>
    <text x="60" y="64" text-anchor="middle" class="text" font-weight="600">App</text>
    <text x="60" y="82" text-anchor="middle" class="text-xs" fill="#666">tu backend</text>

    <line x1="120" y1="70" x2="160" y2="70" class="stroke" marker-end="url(#arrow-mp)"/>
    <text x="140" y="60" text-anchor="middle" class="text-xs" fill="#666">request</text>

    <!-- LLM -->
    <rect x="160" y="40" width="120" height="60" rx="8" class="stroke bg-soft"/>
    <text x="220" y="64" text-anchor="middle" class="text" font-weight="600">LLM</text>
    <text x="220" y="82" text-anchor="middle" class="text-xs" fill="#666">Groq / OpenAI…</text>

    <line x1="280" y1="70" x2="320" y2="70" class="stroke" marker-end="url(#arrow-mp)"/>
    <text x="300" y="60" text-anchor="middle" class="text-xs" fill="#666">response</text>

    <!-- Logger -->
    <rect x="320" y="40" width="120" height="60" rx="8" stroke="#7F77DD" stroke-width="1.6" fill="#F4F2FF"/>
    <text x="380" y="64" text-anchor="middle" class="text" font-weight="600" fill="#7F77DD">Logger</text>
    <text x="380" y="82" text-anchor="middle" class="text-xs" fill="#666">middleware</text>

    <!-- Storage -->
    <line x1="380" y1="100" x2="380" y2="140" class="stroke" marker-end="url(#arrow-mp)"/>
    <ellipse cx="380" cy="170" rx="60" ry="14" class="stroke bg-block"/>
    <path d="M320 170 L320 200 Q320 214 380 214 Q440 214 440 200 L440 170" class="stroke" fill="#FFFFFF"/>
    <ellipse cx="380" cy="170" rx="60" ry="14" fill="#FFFFFF" class="stroke"/>
    <text x="380" y="194" text-anchor="middle" class="text-xs" font-weight="600">storage</text>

    <!-- Dashboard -->
    <line x1="440" y1="200" x2="500" y2="200" class="stroke" marker-end="url(#arrow-mp)"/>
    <rect x="500" y="160" width="180" height="80" rx="6" class="stroke bg-block"/>
    <g transform="translate(510,170)">
      <rect x="0" y="0" width="160" height="14" fill="#F4F2FF"/>
      <text x="6" y="11" class="text-xs" font-weight="600">📊 Dashboard</text>
    </g>
    <g transform="translate(514,192)">
      <rect x="0" y="0" width="36" height="36" rx="2" fill="#7F77DD" opacity="0.4"/>
      <rect x="44" y="10" width="36" height="26" rx="2" fill="#7F77DD" opacity="0.7"/>
      <rect x="88" y="6" width="36" height="30" rx="2" fill="#7F77DD"/>
      <rect x="132" y="14" width="20" height="22" rx="2" fill="#7F77DD" opacity="0.5"/>
    </g>

    <!-- Alerts -->
    <line x1="500" y1="220" x2="500" y2="260" class="stroke-thin" stroke-dasharray="3 3"/>
    <text x="500" y="276" text-anchor="middle" class="text-xs" fill="#D14B4B" font-weight="700">⚠ alertas</text>
  </g>

  <!-- 4 things to log -->
  <g transform="translate(40,320)">
    <text x="14" y="0" class="text" font-weight="600">Los 4 datos que NO podés perder:</text>

    <g transform="translate(14,20)">
      <text class="text-xs" y="0">①  <tspan class="label" font-size="11">input completo</tspan> — prompt renderizado, system + user, modelo, parámetros (temp, top_p).</text>
      <text class="text-xs" y="20">②  <tspan class="label" font-size="11">output completo</tspan> — respuesta generada, tokens consumidos, finish_reason.</text>
      <text class="text-xs" y="40">③  <tspan class="label" font-size="11">latencia y costo</tspan> — tiempo por request, $$ acumulado por usuario / endpoint.</text>
      <text class="text-xs" y="60">④  <tspan class="label" font-size="11">señal de calidad</tspan> — feedback del usuario, errores de parseo, retries, score automático.</text>
    </g>
  </g>

  <text x="480" y="466" text-anchor="middle" class="text-xs" fill="#7F77DD" font-weight="600">→ Tools: Langfuse (OSS) · LangSmith · Arize Phoenix · Helicone (proxy + observability).</text>
</svg>
