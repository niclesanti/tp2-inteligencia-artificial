<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .cat-name { fill: #7F77DD; font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
      .tool { fill: #222222; font-size: 12px; font-weight: 600; }
      .tool-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #222222; }
      .badge-oss { fill: #1D9E75; }
      .badge-com { fill: #7F77DD; }
      .badge-text { fill: #FFFFFF; font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <text x="480" y="36" text-anchor="middle" class="text-strong" font-size="22">El ecosistema de herramientas (mayo 2026)</text>
  <text x="480" y="58" text-anchor="middle" class="text-xs">Selección curada. No usás todas — elegís 1-2 según tu stack y necesidad.</text>

  <!-- Category 1: Evals offline -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="280" height="320" rx="10" class="stroke bg-soft"/>
    <text x="14" y="28" class="cat-name">Evals offline</text>
    <text x="14" y="46" class="text-xs" fill="#666">tests automáticos sobre datasets</text>

    <g transform="translate(14,72)">
      <text class="tool" y="0">Promptfoo</text>
      <rect x="84" y="-10" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="100" y="0" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="14" fill="#666">YAML config, side-by-side, regression</text>

      <text class="tool" y="46">Braintrust</text>
      <rect x="80" y="36" width="40" height="14" rx="7" class="badge-com"/>
      <text x="100" y="46" text-anchor="middle" class="badge-text">COM</text>
      <text class="text-xs" y="60" fill="#666">"Notion para evals"</text>

      <text class="tool" y="92">DeepEval</text>
      <rect x="76" y="82" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="92" y="92" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="106" fill="#666">"pytest para LLMs"</text>

      <text class="tool" y="138">OpenAI Evals</text>
      <rect x="100" y="128" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="116" y="138" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="152" fill="#666">batería pública grande</text>

      <text class="tool" y="184">Inspect AI</text>
      <rect x="84" y="174" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="100" y="184" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="198" fill="#666">UK AI Safety Institute, riguroso</text>
    </g>
  </g>

  <!-- Category 2: Eval RAG -->
  <g transform="translate(340,90)">
    <rect x="0" y="0" width="280" height="160" rx="10" stroke="#E0A45C" stroke-width="1.6" fill="#FFF7E6"/>
    <text x="14" y="28" class="cat-name" fill="#9E6516">Evals de RAG</text>
    <text x="14" y="46" class="text-xs" fill="#9E6516">métricas específicas para retrieval</text>

    <g transform="translate(14,72)">
      <text class="tool" y="0">Ragas</text>
      <rect x="50" y="-10" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="66" y="0" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="14" fill="#666">faithfulness, relevance, context recall</text>

      <text class="text-xs" y="44" fill="#9E6516" font-style="italic">Lo vamos a usar en Clase 3 (RAG).</text>
    </g>
  </g>

  <!-- Category 3: Monitoreo -->
  <g transform="translate(640,90)">
    <rect x="0" y="0" width="280" height="320" rx="10" class="stroke bg-soft"/>
    <text x="14" y="28" class="cat-name">Monitoreo / Observability</text>
    <text x="14" y="46" class="text-xs" fill="#666">tracing, logs, dashboards en producción</text>

    <g transform="translate(14,72)">
      <text class="tool" y="0">Langfuse</text>
      <rect x="74" y="-10" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="90" y="0" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="14" fill="#666">líder OSS, self-host fácil</text>

      <text class="tool" y="46">LangSmith</text>
      <rect x="80" y="36" width="40" height="14" rx="7" class="badge-com"/>
      <text x="100" y="46" text-anchor="middle" class="badge-text">COM</text>
      <text class="text-xs" y="60" fill="#666">de LangChain, integra todo su stack</text>

      <text class="tool" y="92">Arize Phoenix</text>
      <rect x="100" y="82" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="116" y="92" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="106" fill="#666">tracing + drift detection</text>

      <text class="tool" y="138">Helicone</text>
      <rect x="76" y="128" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="92" y="138" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="152" fill="#666">proxy + observability, drop-in</text>

      <text class="tool" y="184">TruLens</text>
      <rect x="62" y="174" width="32" height="14" rx="7" class="badge-oss"/>
      <text x="78" y="184" text-anchor="middle" class="badge-text">OSS</text>
      <text class="text-xs" y="198" fill="#666">evals + tracing combinado</text>
    </g>
  </g>

  <!-- Category 2 secondary box: practical advice -->
  <g transform="translate(340,270)">
    <rect x="0" y="0" width="280" height="140" rx="10" class="stroke bg-block"/>
    <text x="14" y="28" class="text" font-weight="600">¿Por dónde empezar?</text>

    <g transform="translate(14,52)">
      <text class="text-xs" y="0">• <tspan font-weight="600">Hobby / curso:</tspan> Promptfoo (gratis, simple).</text>
      <text class="text-xs" y="20">• <tspan font-weight="600">Empresa con LangChain:</tspan> LangSmith.</text>
      <text class="text-xs" y="40">• <tspan font-weight="600">Empresa sin LangChain:</tspan> Langfuse.</text>
      <text class="text-xs" y="60">• <tspan font-weight="600">Solo necesitás logs:</tspan> Helicone (proxy).</text>
    </g>
  </g>

  <text x="480" y="446" text-anchor="middle" class="text-xs" fill="#666">El espacio se mueve rápido. La idea — eval offline + monitoreo online — es lo que te queda.</text>
</svg>
