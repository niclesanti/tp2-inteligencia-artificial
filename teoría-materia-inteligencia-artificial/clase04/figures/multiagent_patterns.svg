<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 76 960 378" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .step-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; fill: #7F77DD; }
      .arrow-fill { fill: #7F77DD; }
      .lbl { fill: #222222; font-size: 13px; font-weight: 700; text-anchor: middle; }
      .nodelbl { fill: #222222; font-size: 12px; font-weight: 600; text-anchor: middle; }
    </style>
    <marker id="arrow-ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>


  <!-- ===== TOP ROW: Secuencial, Router, Orquestador ===== -->

  <!-- 1. Secuencial -->
  <g transform="translate(20,90)">
    <rect x="0" y="0" width="290" height="150" rx="10" class="stroke bg-soft"/>
    <text x="145" y="138" class="lbl">Secuencial</text>
    <g>
      <rect x="24" y="50" width="56" height="40" rx="8" class="stroke bg-block"/>
      <text x="52" y="74" class="nodelbl">A</text>
      <rect x="117" y="50" width="56" height="40" rx="8" class="stroke bg-block"/>
      <text x="145" y="74" class="nodelbl">B</text>
      <rect x="210" y="50" width="56" height="40" rx="8" class="stroke bg-block"/>
      <text x="238" y="74" class="nodelbl">C</text>
    </g>
    <g class="accent" fill="none">
      <path d="M80 70 L 113 70" marker-end="url(#arrow-ma)"/>
      <path d="M173 70 L 206 70" marker-end="url(#arrow-ma)"/>
    </g>
  </g>

  <!-- 2. Router -->
  <g transform="translate(335,90)">
    <rect x="0" y="0" width="290" height="150" rx="10" class="stroke bg-soft"/>
    <text x="145" y="138" class="lbl">Router</text>
    <rect x="24" y="52" width="50" height="38" rx="8" stroke="#7F77DD" stroke-width="1.6" class="bg-block"/>
    <text x="49" y="75" class="nodelbl">R</text>
    <!-- specialists -->
    <rect x="200" y="24" width="66" height="30" rx="7" stroke="#7F77DD" stroke-width="1.8" fill="#F4F2FF"/>
    <text x="233" y="44" class="nodelbl" fill="#7F77DD">esp 1</text>
    <rect x="200" y="60" width="66" height="30" rx="7" class="stroke-thin bg-block"/>
    <text x="233" y="80" class="nodelbl" fill="#999">esp 2</text>
    <rect x="200" y="96" width="66" height="30" rx="7" class="stroke-thin bg-block"/>
    <text x="233" y="116" class="nodelbl" fill="#999">esp 3</text>
    <g class="accent" fill="none">
      <path d="M74 67 Q 140 50 196 40" marker-end="url(#arrow-ma)"/>
    </g>
    <g class="stroke-thin" fill="none" opacity="0.5">
      <path d="M74 71 L 196 75"/>
      <path d="M74 75 Q 140 100 196 110"/>
    </g>
  </g>

  <!-- 3. Orquestador -->
  <g transform="translate(650,90)">
    <rect x="0" y="0" width="290" height="150" rx="10" class="stroke bg-soft"/>
    <text x="145" y="138" class="lbl">Orquestador</text>
    <rect x="120" y="20" width="50" height="34" rx="8" stroke="#7F77DD" stroke-width="1.6" class="bg-block"/>
    <text x="145" y="42" class="nodelbl">O</text>
    <!-- workers -->
    <rect x="40" y="86" width="56" height="30" rx="7" class="stroke bg-block"/>
    <text x="68" y="106" class="nodelbl">w1</text>
    <rect x="117" y="86" width="56" height="30" rx="7" class="stroke bg-block"/>
    <text x="145" y="106" class="nodelbl">w2</text>
    <rect x="194" y="86" width="56" height="30" rx="7" class="stroke bg-block"/>
    <text x="222" y="106" class="nodelbl">w3</text>
    <!-- down (delega) -->
    <g class="accent" fill="none">
      <path d="M132 54 L 80 84" marker-end="url(#arrow-ma)"/>
      <path d="M145 54 L 145 84" marker-end="url(#arrow-ma)"/>
      <path d="M158 54 L 210 84" marker-end="url(#arrow-ma)"/>
    </g>
    <!-- up (junta) dashed -->
    <g class="stroke-thin" fill="none" stroke-dasharray="3 3" opacity="0.7">
      <path d="M88 86 L 138 56"/>
      <path d="M202 86 L 152 56"/>
    </g>
  </g>

  <!-- ===== BOTTOM ROW: Paralelo, Jerárquico ===== -->

  <!-- 4. Paralelo -->
  <g transform="translate(120,270)">
    <rect x="0" y="0" width="330" height="170" rx="10" class="stroke bg-soft"/>
    <text x="165" y="158" class="lbl">Paralelo</text>
    <rect x="24" y="64" width="50" height="36" rx="8" class="stroke bg-block"/>
    <text x="49" y="86" class="nodelbl">in</text>
    <rect x="140" y="24" width="60" height="30" rx="7" class="stroke bg-block"/>
    <text x="170" y="44" class="nodelbl">p1</text>
    <rect x="140" y="66" width="60" height="30" rx="7" class="stroke bg-block"/>
    <text x="170" y="86" class="nodelbl">p2</text>
    <rect x="140" y="108" width="60" height="30" rx="7" class="stroke bg-block"/>
    <text x="170" y="128" class="nodelbl">p3</text>
    <rect x="262" y="64" width="50" height="36" rx="8" stroke="#7F77DD" stroke-width="1.6" fill="#F4F2FF"/>
    <text x="287" y="86" class="nodelbl" fill="#7F77DD">join</text>
    <g class="accent" fill="none">
      <path d="M74 78 L 136 40" marker-end="url(#arrow-ma)"/>
      <path d="M74 82 L 136 82" marker-end="url(#arrow-ma)"/>
      <path d="M74 86 L 136 122" marker-end="url(#arrow-ma)"/>
      <path d="M200 39 L 260 76" marker-end="url(#arrow-ma)"/>
      <path d="M200 81 L 260 82" marker-end="url(#arrow-ma)"/>
      <path d="M200 123 L 260 88" marker-end="url(#arrow-ma)"/>
    </g>
  </g>

  <!-- 5. Jerárquico -->
  <g transform="translate(490,270)">
    <rect x="0" y="0" width="350" height="170" rx="10" class="stroke bg-soft"/>
    <text x="175" y="158" class="lbl">Jerárquico</text>
    <!-- top orchestrator -->
    <rect x="150" y="16" width="50" height="28" rx="7" stroke="#7F77DD" stroke-width="1.6" class="bg-block"/>
    <text x="175" y="35" class="nodelbl">O</text>
    <!-- two sub-orchestrators -->
    <rect x="70" y="62" width="56" height="28" rx="7" class="stroke bg-block"/>
    <text x="98" y="81" class="nodelbl">s1</text>
    <rect x="224" y="62" width="56" height="28" rx="7" class="stroke bg-block"/>
    <text x="252" y="81" class="nodelbl">s2</text>
    <!-- leaves -->
    <rect x="34" y="108" width="46" height="26" rx="6" class="stroke-thin bg-block"/>
    <text x="57" y="126" class="nodelbl" font-size="11">l1</text>
    <rect x="92" y="108" width="46" height="26" rx="6" class="stroke-thin bg-block"/>
    <text x="115" y="126" class="nodelbl" font-size="11">l2</text>
    <rect x="212" y="108" width="46" height="26" rx="6" class="stroke-thin bg-block"/>
    <text x="235" y="126" class="nodelbl" font-size="11">l3</text>
    <rect x="270" y="108" width="46" height="26" rx="6" class="stroke-thin bg-block"/>
    <text x="293" y="126" class="nodelbl" font-size="11">l4</text>
    <g class="accent" fill="none">
      <path d="M160 44 L 110 60" marker-end="url(#arrow-ma)"/>
      <path d="M190 44 L 244 60" marker-end="url(#arrow-ma)"/>
    </g>
    <g class="stroke" fill="none">
      <path d="M90 90 L 64 106" marker-end="url(#arrow-ma)"/>
      <path d="M104 90 L 120 106" marker-end="url(#arrow-ma)"/>
      <path d="M244 90 L 240 106" marker-end="url(#arrow-ma)"/>
      <path d="M260 90 L 290 106" marker-end="url(#arrow-ma)"/>
    </g>
  </g>
</svg>
