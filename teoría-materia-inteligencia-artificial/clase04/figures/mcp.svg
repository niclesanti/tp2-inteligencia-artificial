<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 70 960 408" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .step-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; fill: #7F77DD; }
      .arrow-fill { fill: #7F77DD; }
      .mess { stroke: #D14B4B; stroke-width: 1; fill: none; opacity: 0.55; }
    </style>
    <marker id="arrow-mcp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>


  <!-- Vertical divider -->
  <line x1="480" y1="80" x2="480" y2="430" class="stroke-thin" stroke-dasharray="4 4"/>

  <!-- LEFT half title -->
  <text x="240" y="98" text-anchor="middle" class="text" font-weight="700" fill="#D14B4B">Sin estándar — M×N</text>

  <!-- LEFT agents (left column) -->
  <g>
    <rect x="40" y="130" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="85" y="155" text-anchor="middle" class="text-xs">Agente A</text>
    <rect x="40" y="230" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="85" y="255" text-anchor="middle" class="text-xs">Agente B</text>
    <rect x="40" y="330" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="85" y="355" text-anchor="middle" class="text-xs">Agente C</text>
  </g>
  <!-- LEFT tools (right column) -->
  <g>
    <rect x="350" y="130" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="395" y="155" text-anchor="middle" class="text-xs">Tool 1</text>
    <rect x="350" y="230" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="395" y="255" text-anchor="middle" class="text-xs">Tool 2</text>
    <rect x="350" y="330" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="395" y="355" text-anchor="middle" class="text-xs">Tool 3</text>
  </g>
  <!-- LEFT tangle: every agent to every tool (9 lines) -->
  <g class="mess">
    <line x1="130" y1="150" x2="350" y2="150"/>
    <line x1="130" y1="150" x2="350" y2="250"/>
    <line x1="130" y1="150" x2="350" y2="350"/>
    <line x1="130" y1="250" x2="350" y2="150"/>
    <line x1="130" y1="250" x2="350" y2="250"/>
    <line x1="130" y1="250" x2="350" y2="350"/>
    <line x1="130" y1="350" x2="350" y2="150"/>
    <line x1="130" y1="350" x2="350" y2="250"/>
    <line x1="130" y1="350" x2="350" y2="350"/>
  </g>
  <text x="240" y="412" text-anchor="middle" class="text-xs" fill="#D14B4B">M × N integraciones a medida</text>

  <!-- RIGHT half title -->
  <text x="720" y="98" text-anchor="middle" class="text" font-weight="700" fill="#7F77DD">Con MCP — M+N</text>

  <!-- RIGHT agents (clientes) -->
  <g>
    <rect x="510" y="130" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="555" y="155" text-anchor="middle" class="text-xs">Cliente A</text>
    <rect x="510" y="230" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="555" y="255" text-anchor="middle" class="text-xs">Cliente B</text>
    <rect x="510" y="330" width="90" height="40" rx="8" class="stroke bg-block"/>
    <text x="555" y="355" text-anchor="middle" class="text-xs">Cliente C</text>
  </g>

  <!-- RIGHT central MCP box -->
  <g transform="translate(660,210)">
    <rect x="0" y="0" width="90" height="80" rx="8" stroke="#7F77DD" stroke-width="2.2" class="bg-soft"/>
    <text x="45" y="40" text-anchor="middle" class="text" font-weight="700" fill="#7F77DD" font-size="16">MCP</text>
    <text x="45" y="58" text-anchor="middle" class="text-xs" fill="#666">protocolo</text>
  </g>

  <!-- RIGHT servers -->
  <g>
    <rect x="830" y="130" width="100" height="40" rx="8" class="stroke bg-block"/>
    <text x="880" y="155" text-anchor="middle" class="text-xs">Server 1</text>
    <rect x="830" y="230" width="100" height="40" rx="8" class="stroke bg-block"/>
    <text x="880" y="255" text-anchor="middle" class="text-xs">Server 2</text>
    <rect x="830" y="330" width="100" height="40" rx="8" class="stroke bg-block"/>
    <text x="880" y="355" text-anchor="middle" class="text-xs">Server 3</text>
  </g>

  <!-- RIGHT clean converge / fan-out arrows -->
  <g class="accent" fill="none">
    <path d="M600 150 Q 640 200 658 230" marker-end="url(#arrow-mcp)"/>
    <path d="M600 250 L 658 250" marker-end="url(#arrow-mcp)"/>
    <path d="M600 350 Q 640 300 658 270" marker-end="url(#arrow-mcp)"/>
    <path d="M750 230 Q 800 200 828 155" marker-end="url(#arrow-mcp)"/>
    <path d="M750 250 L 828 250" marker-end="url(#arrow-mcp)"/>
    <path d="M750 270 Q 800 300 828 345" marker-end="url(#arrow-mcp)"/>
  </g>
  <text x="720" y="412" text-anchor="middle" class="text-xs" fill="#7F77DD">M + N integraciones reutilizables</text>

  <text x="480" y="466" text-anchor="middle" class="text-xs" fill="#666">Escribís el server una vez; cualquier cliente MCP lo usa sin código a medida.</text>
</svg>
