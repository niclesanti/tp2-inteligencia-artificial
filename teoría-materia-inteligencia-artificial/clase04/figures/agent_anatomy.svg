<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 74 960 398" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .stroke-thin { stroke: #222222; stroke-width: 1; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-strong { fill: #222222; font-size: 16px; font-weight: 600; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .step-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; fill: #7F77DD; }
      .arrow-fill { fill: #7F77DD; }
      .comp-name { fill: #222222; font-size: 14px; font-weight: 700; }
    </style>
    <marker id="arrow-an" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>


  <!-- Center: LLM brain -->
  <g transform="translate(370,205)">
    <rect x="0" y="0" width="220" height="90" rx="8" stroke="#7F77DD" stroke-width="2.2" class="bg-soft"/>
    <text x="110" y="38" text-anchor="middle" class="text" font-weight="700" fill="#7F77DD" font-size="18">LLM</text>
    <text x="110" y="62" text-anchor="middle" class="text" font-weight="600">el cerebro</text>
    <text x="110" y="78" text-anchor="middle" class="text-xs" fill="#666">razona, planifica y decide</text>
  </g>

  <!-- Thin connectors -->
  <g class="stroke-thin">
    <line x1="370" y1="230" x2="250" y2="135"/>
    <line x1="590" y1="230" x2="710" y2="135"/>
    <line x1="370" y1="270" x2="250" y2="365"/>
    <line x1="590" y1="270" x2="710" y2="365"/>
    <line x1="480" y1="295" x2="480" y2="375"/>
  </g>

  <!-- Component: Memoria (top-left) -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="210" height="68" rx="8" class="stroke bg-block"/>
    <text x="14" y="26" class="comp-name">Memoria</text>
    <text x="14" y="46" class="text-xs" fill="#666">corto plazo (contexto) y</text>
    <text x="14" y="60" class="text-xs" fill="#666">largo plazo (vector store)</text>
  </g>

  <!-- Component: Herramientas (top-right) -->
  <g transform="translate(710,90)">
    <rect x="0" y="0" width="210" height="68" rx="8" class="stroke bg-block"/>
    <text x="14" y="26" class="comp-name">Herramientas</text>
    <text x="14" y="46" class="text-xs" fill="#666">APIs, código, búsqueda,</text>
    <text x="14" y="60" class="text-xs" fill="#666">RAG</text>
  </g>

  <!-- Component: Planificador (bottom-left) -->
  <g transform="translate(40,342)">
    <rect x="0" y="0" width="210" height="68" rx="8" class="stroke bg-block"/>
    <text x="14" y="26" class="comp-name">Planificador</text>
    <text x="14" y="46" class="text-xs" fill="#666">descompone el objetivo</text>
    <text x="14" y="60" class="text-xs" fill="#666">en subtareas</text>
  </g>

  <!-- Component: Loop de reflexión (bottom-right) -->
  <g transform="translate(710,342)">
    <rect x="0" y="0" width="210" height="68" rx="8" class="stroke bg-block"/>
    <text x="14" y="26" class="comp-name">Loop de reflexión</text>
    <text x="14" y="46" class="text-xs" fill="#666">Thought → Action →</text>
    <text x="14" y="60" class="text-xs" fill="#666">Observation</text>
  </g>

  <!-- Component: Control / Seguridad (bottom-center, RED) -->
  <g transform="translate(375,390)">
    <rect x="0" y="0" width="210" height="68" rx="8" stroke="#D14B4B" stroke-width="1.6" fill="#FDF3F3"/>
    <text x="14" y="26" class="comp-name" fill="#D14B4B">Control / Seguridad</text>
    <text x="14" y="46" class="text-xs" fill="#9E3636">permisos, validación,</text>
    <text x="14" y="60" class="text-xs" fill="#9E3636">límites de acciones</text>
  </g>
</svg>
