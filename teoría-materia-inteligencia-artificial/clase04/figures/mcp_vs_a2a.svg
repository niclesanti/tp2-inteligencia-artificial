<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .stroke { stroke: #222222; stroke-width: 1.4; fill: none; }
      .accent { stroke: #7F77DD; stroke-width: 1.6; fill: none; }
      .text { fill: #222222; font-size: 13px; }
      .text-xs { fill: #666666; font-size: 11px; }
      .bg-soft { fill: #F4F2FF; }
      .bg-block { fill: #FFFFFF; }
      .hdr { fill: #7F77DD; font-size: 16px; font-weight: 700; }
      .box-name { fill: #222222; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .arrow-fill { fill: #7F77DD; }
    </style>
    <marker id="arrow-a2a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <!-- ===== Center: Agente ===== -->
  <rect x="410" y="118" width="140" height="64" rx="10" stroke="#7F77DD" stroke-width="2.2" class="bg-soft"/>
  <text x="480" y="148" text-anchor="middle" class="text" font-weight="700" fill="#7F77DD" font-size="16">Agente</text>
  <text x="480" y="168" text-anchor="middle" class="text-xs" fill="#666">tu orquestador</text>

  <!-- ===== LEFT: MCP (agente ↔ herramientas) ===== -->
  <text x="150" y="34" text-anchor="middle" class="hdr">MCP</text>
  <text x="150" y="52" text-anchor="middle" class="text-xs">agente ↔ herramientas / datos</text>
  <text x="150" y="68" text-anchor="middle" class="text-xs" fill="#999">Anthropic</text>

  <rect x="40" y="108" width="170" height="44" rx="8" class="stroke bg-block"/>
  <text x="125" y="135" class="box-name">Herramienta / API</text>
  <rect x="40" y="170" width="170" height="44" rx="8" class="stroke bg-block"/>
  <text x="125" y="197" class="box-name">Datos · RAG (Clase 3)</text>

  <g class="accent">
    <path d="M408 142 L 214 130" marker-end="url(#arrow-a2a)"/>
    <path d="M408 158 L 214 192" marker-end="url(#arrow-a2a)"/>
  </g>
  <rect x="270" y="139" width="48" height="22" rx="6" class="bg-soft" stroke="#7F77DD" stroke-width="1"/>
  <text x="294" y="154" text-anchor="middle" class="text-xs" fill="#7F77DD" font-weight="700">MCP</text>

  <!-- ===== RIGHT: A2A (agente ↔ otro agente) ===== -->
  <text x="810" y="34" text-anchor="middle" class="hdr">A2A</text>
  <text x="810" y="52" text-anchor="middle" class="text-xs">agente ↔ otro agente</text>
  <text x="810" y="68" text-anchor="middle" class="text-xs" fill="#999">Google · Linux Foundation</text>

  <rect x="750" y="108" width="170" height="44" rx="8" class="stroke bg-block"/>
  <text x="835" y="135" class="box-name">Agente B (otro vendor)</text>
  <rect x="750" y="170" width="170" height="44" rx="8" class="stroke bg-block"/>
  <text x="835" y="197" class="box-name">Agente C (otro framework)</text>

  <g class="accent">
    <path d="M552 142 L 746 130" marker-end="url(#arrow-a2a)"/>
    <path d="M552 158 L 746 192" marker-end="url(#arrow-a2a)"/>
  </g>
  <rect x="642" y="139" width="48" height="22" rx="6" class="bg-soft" stroke="#7F77DD" stroke-width="1"/>
  <text x="666" y="154" text-anchor="middle" class="text-xs" fill="#7F77DD" font-weight="700">A2A</text>

  <!-- bottom takeaway -->
  <text x="480" y="284" text-anchor="middle" class="text-xs" fill="#666">Complementarios: MCP para usar herramientas; A2A para coordinarse con otros agentes, aunque sean de distinto framework o vendor.</text>
</svg>
