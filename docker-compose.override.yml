

services:
  db:
    ports:
      - "5432:5432"

  pgadmin:
    ports:
      - "5050:80"

  backend:
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      FRONTEND_URL: http://localhost:3100
      # Agente IA - Requiere GROQ_API_KEY en el entorno o en un archivo .env
      AGENTE_IA_ENABLED: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3100:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8080
      - AGENTE_URL=http://agente:8000
      - BACKEND_URL=http://backend:8080

  agente:
    ports:
      - "8000:8000"
    volumes:
      - ./agente:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    ports:
      - "6379:6379"

  redisinsight:
    ports:
      - "5540:5540"
